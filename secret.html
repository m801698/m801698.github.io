<html>
  <head>
    <style>
      .spoiler {
          overflow: hidden;
      }
      .checker {
          display: none;
      }
      .toggle {
          display: block;
          overflow: hidden;
          width: 100px;
          height: 20px;
          background: #ecf0f1;
          padding: 5px;
          color: #aaa;
          border-radius: 3px;
          cursor: pointer;
          white-space: nowrap;
      }
      .checker:not(:checked) + .toggle + .spoiler {
          height: 0;
      }
      .checker:checked + .toggle {
          display: none;
      }
      code.text {
          white-space: pre;
          font-family: monospace;
          font-size: 14px;
          white-space: normal;
      }
    </style>
  </head>
  <body>
    <input type="checkbox" id="checker1" class="checker">
    <label for="checker1" class="toggle">Thomas Venneker</label>
    <div class="spoiler">
      <p>|----------------|</p>
      <p>m801695@vatel.nl</p>
      <code class="text">Thomas1!</code>
      <p>|----------------|</p>
    </div>
  </body>
</html>
